<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Office Register</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a2f45;
  --text:#e8eaf0;--muted:#7b82a0;
  --a1:#6c8fff;--a2:#e05c5c;--a3:#3ecf8e;--a4:#f0a94c;--gold:#f0a94c;
  --r:14px;--rs:10px;--nav:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;
  overflow-x:hidden;min-height:100vh;padding-bottom:calc(var(--nav)+8px);
  -webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* TOP */
.top-hdr{position:sticky;top:0;z-index:50;background:var(--surface);
  border-bottom:1px solid var(--border);padding:11px 14px;
  display:flex;align-items:center;justify-content:space-between;}
.app-logo{font-size:1.12rem;font-weight:900;letter-spacing:-0.02em;}
.app-logo span{color:var(--gold);}
.total-pill{background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:4px 11px;font-size:0.7rem;
  font-family:'JetBrains Mono',monospace;color:var(--gold);font-weight:700;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);
  background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;background:none;border:none;cursor:pointer;color:var(--muted);
  font-family:'Nunito',sans-serif;font-size:0.56rem;font-weight:800;
  text-transform:uppercase;letter-spacing:0.05em;transition:color 0.15s;
  padding:4px 2px;position:relative;}
.nb.active{color:var(--text);}
.nb .ni{font-size:1.2rem;line-height:1;}
.nb .ndot{position:absolute;top:6px;right:calc(50% - 12px);width:7px;height:7px;border-radius:50%;display:none;}
.nb.active .ndot{display:block;}
.nb .nbadge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--a2);
  color:#fff;border-radius:10px;padding:1px 4px;font-size:0.5rem;font-weight:900;
  min-width:14px;text-align:center;display:none;}

/* PAGES */
.page{display:none;}.page.active{display:block;}

/* DASHBOARD */
.dh{padding:18px 14px 8px;}
.dh h2{font-size:1.45rem;font-weight:900;line-height:1.2;}
.dh h2 span{color:var(--gold);}
.dh p{color:var(--muted);font-size:0.78rem;margin-top:3px;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:10px 14px 14px;}
.sbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px;}
.sbox .sl{font-size:0.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
.sbox .sv{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;}
.rcards{padding:0 14px 14px;display:flex;flex-direction:column;gap:9px;}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 12px;display:flex;align-items:center;gap:11px;cursor:pointer;
  transition:transform 0.1s;position:relative;overflow:hidden;}
.rcard:active{transform:scale(0.98);}
.rcard-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:14px 0 0 14px;}
.rcard-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.rcard-info{flex:1;min-width:0;}
.rcard-name{font-size:0.9rem;font-weight:800;margin-bottom:2px;}
.rcard-desc{font-size:0.68rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rcard-right{text-align:right;flex-shrink:0;}
.rcard-count{font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:700;}
.rcard-lbl{font-size:0.56rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.rcard-arr{color:var(--muted);font-size:1.2rem;margin-left:3px;}

/* REGISTER */
.rtop{display:flex;align-items:center;gap:9px;padding:11px 14px;
  border-bottom:1px solid var(--border);background:var(--surface);
  position:sticky;top:47px;z-index:40;}
.back-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  color:var(--text);width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1rem;flex-shrink:0;}
.rtop-info{flex:1;min-width:0;}
.rtop-info h3{font-size:0.95rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rtop-info p{font-size:0.63rem;color:var(--muted);}
.add-btn{display:flex;align-items:center;gap:4px;padding:7px 13px;border:none;
  border-radius:20px;font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:800;
  cursor:pointer;color:#fff;flex-shrink:0;transition:transform 0.1s;}
.add-btn:active{transform:scale(0.94);}

/* STATS */
.rstats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
.rsc{background:var(--surface2);padding:8px 12px;}
.rsc .rsl{font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px;}
.rsc .rsv{font-family:'JetBrains Mono',monospace;font-size:0.85rem;font-weight:700;}

/* FILTER BAR */
.fbar{display:flex;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface);align-items:center;overflow-x:auto;}
.fbar::-webkit-scrollbar{display:none;}
.finput{flex:1;min-width:120px;padding:8px 10px;background:var(--surface2);
  border:1px solid var(--border);border-radius:8px;color:var(--text);
  font-family:'Nunito',sans-serif;font-size:0.82rem;outline:none;-webkit-appearance:none;}
.finput:focus{border-color:var(--a1);}
.fchip{padding:7px 11px;border:1px solid var(--border);border-radius:20px;
  background:var(--surface2);color:var(--muted);font-family:'Nunito',sans-serif;
  font-size:0.72rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s;}
.fchip.active{border-color:currentColor;}
.fclr{padding:7px 11px;border:1px solid var(--border);border-radius:20px;
  background:transparent;color:var(--a2);font-family:'Nunito',sans-serif;
  font-size:0.72rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}

/* ENTRIES */
.elist{padding:0 14px 12px;display:flex;flex-direction:column;gap:9px;}
.ecard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:13px;position:relative;transition:border-color 0.15s;}
.ecard.sel{border-color:var(--a2);}
.ecard-date{font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;
  margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.ecard-date::before{content:'📅';font-size:0.7rem;}
.ectop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.ename{font-size:0.88rem;font-weight:800;flex:1;min-width:0;word-break:break-word;}
.etotal{font-family:'JetBrains Mono',monospace;font-size:0.9rem;font-weight:700;flex-shrink:0;}
.emeta{display:flex;flex-wrap:wrap;gap:5px;}
.mc{background:var(--surface2);border-radius:6px;padding:3px 7px;font-size:0.64rem;color:var(--muted);}
.mc span{color:var(--text);font-weight:700;}
.edel-btn{position:absolute;top:10px;right:10px;background:rgba(224,92,92,0.15);
  border:1px solid rgba(224,92,92,0.3);border-radius:6px;color:var(--a2);
  font-size:0.72rem;font-weight:800;cursor:pointer;padding:3px 8px;display:none;}
.ecard.sel .edel-btn{display:block;}
.hint{text-align:center;color:var(--muted);font-size:0.65rem;padding:5px 14px;margin-bottom:3px;}

/* EXPORT BTN */
.export-row{padding:0 14px 10px;display:flex;gap:8px;}
.exp-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px;border:1px solid var(--border);border-radius:var(--rs);
  background:var(--surface);color:var(--muted);font-family:'Nunito',sans-serif;
  font-size:0.78rem;font-weight:800;cursor:pointer;transition:all 0.15s;}
.exp-btn:hover{border-color:var(--a3);color:var(--a3);}
.exp-btn:active{transform:scale(0.97);}

/* GRAND TOTAL */
.gbar{margin:0 14px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:13px 14px;display:flex;justify-content:space-between;align-items:center;}
.glabel{font-size:0.76rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;}
.gval{font-family:'JetBrains Mono',monospace;font-size:1.08rem;font-weight:700;}

/* EMPTY */
.empty{padding:48px 20px;text-align:center;}
.empty .ei{font-size:2.8rem;opacity:0.25;margin-bottom:10px;}
.empty p{color:var(--muted);font-size:0.82rem;line-height:1.6;}

/* MODAL */
.ovlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px);z-index:200;align-items:flex-end;justify-content:center;}
.ovlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;
  width:100%;max-width:600px;max-height:92vh;overflow-y:auto;
  animation:mup 0.25s cubic-bezier(0.34,1.4,0.64,1);}
@keyframes mup{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:11px auto 0;}
.mhead{padding:13px 17px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.mhead h3{font-size:0.98rem;font-weight:800;}
.mhead p{font-size:0.66rem;color:var(--muted);margin-top:2px;}
.mcls{background:var(--surface2);border:1px solid var(--border);color:var(--muted);
  border-radius:8px;width:30px;height:30px;font-size:0.95rem;display:flex;
  align-items:center;justify-content:center;cursor:pointer;}
.mbody{padding:13px 17px;display:flex;flex-direction:column;gap:11px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:0.66rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
.fg input{padding:11px 11px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--rs);color:var(--text);font-family:'Nunito',sans-serif;font-size:0.92rem;
  outline:none;width:100%;-webkit-appearance:none;}
.fg input:focus{border-color:var(--a1);}
.fg input[readonly]{color:var(--gold);background:rgba(240,169,76,0.08);border-color:rgba(240,169,76,0.25);}
.cprev{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:11px;}
.crow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:0.8rem;}
.crow span:first-child{color:var(--muted);}
.crow span:last-child{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:0.78rem;}
.crow.tot{border-top:1px solid var(--border);margin-top:5px;padding-top:8px;}
.crow.tot span{font-size:0.92rem!important;}
.mfoot{padding:11px 17px 14px;display:flex;gap:9px;border-top:1px solid var(--border);}
.bcnl{flex:1;padding:11px;border:1px solid var(--border);border-radius:var(--rs);
  background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.86rem;font-weight:700;cursor:pointer;}
.bsave{flex:2;padding:11px;border:none;border-radius:var(--rs);color:#fff;
  font-family:'Nunito',sans-serif;font-size:0.86rem;font-weight:800;cursor:pointer;transition:transform 0.1s;}
.bsave:active{transform:scale(0.97);}

/* DEL DIALOG */
.dovlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);
  z-index:250;align-items:center;justify-content:center;padding:20px;}
.dovlay.open{display:flex;}
.dbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:22px 17px;width:100%;max-width:300px;text-align:center;}
.dbox h4{font-size:0.96rem;font-weight:800;margin-bottom:6px;}
.dbox p{color:var(--muted);font-size:0.76rem;margin-bottom:17px;line-height:1.5;}
.dbtns{display:flex;gap:9px;}
.dbtns button{flex:1;padding:11px;border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:0.84rem;font-weight:800;cursor:pointer;border:none;}
.dno{background:var(--surface2);color:var(--text);border:1px solid var(--border)!important;}
.dyes{background:var(--a2);color:#fff;}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav)+12px);left:50%;
  transform:translateX(-50%) translateY(16px);background:var(--surface2);
  border:1px solid var(--border);border-radius:20px;padding:8px 18px;
  font-size:0.8rem;font-weight:700;color:var(--text);z-index:300;white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);opacity:0;transition:all 0.2s ease;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* DATE GROUP HEADER */
.dgroup-hdr{padding:8px 14px 4px;font-size:0.68rem;font-weight:800;
  color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;}
</style>
</head>
<body>

<div class="top-hdr">
  <div class="app-logo">Office<span>Suite</span></div>
  <div class="total-pill" id="gtotal">₹0.00</div>
</div>

<!-- DASHBOARD -->
<div class="page active" id="page-dash">
  <div class="dh">
    <h2>My <span>Registers</span> 📂</h2>
    <p>Tap any register to view or add entries</p>
  </div>
  <div class="sgrid">
    <div class="sbox"><div class="sl">Registers</div><div class="sv">4</div></div>
    <div class="sbox"><div class="sl">Total Entries</div><div class="sv" id="d-ent">0</div></div>
    <div class="sbox" style="grid-column:span 2">
      <div class="sl">Combined Grand Total</div>
      <div class="sv" style="color:var(--gold)" id="d-gt">₹0.00</div>
    </div>
  </div>
  <div class="rcards" id="rcards"></div>
</div>

<!-- REGISTER VIEW -->
<div class="page" id="page-reg">
  <div class="rtop">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="rtop-info">
      <h3 id="rtitle">Register</h3>
      <p id="rsub">Tap + to add</p>
    </div>
    <button class="add-btn" id="radd" onclick="openModal()">＋ Add</button>
  </div>
  <div class="rstats" id="rstats"></div>
  <!-- Filter bar -->
  <div class="fbar" id="fbar">
    <input class="finput" type="text" placeholder="🔍 Search..." id="sinput" oninput="onSearch(this.value)"/>
    <input class="finput" type="date" id="fdate-from" onchange="applyFilter()" style="max-width:130px;" title="From date"/>
    <input class="finput" type="date" id="fdate-to" onchange="applyFilter()" style="max-width:130px;" title="To date"/>
    <button class="fclr" onclick="clearFilter()" id="clr-btn" style="display:none">✕ Clear</button>
  </div>
  <div class="export-row">
    <button class="exp-btn" onclick="exportCSV()">📥 Export CSV</button>
    <button class="exp-btn" onclick="exportAll()">📊 Export All Data</button>
  </div>
  <div id="rcontent"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="nb active" id="nb-d" onclick="showDash()">
    <span class="ni">🏠</span><span class="ndot" style="background:var(--gold)"></span>Home
  </button>
  <button class="nb" id="nb-0" onclick="openReg(0)">
    <span class="ni">🧾</span><span class="ndot" style="background:var(--a1)"></span>
    <span class="nbadge" id="b0"></span>Imprest
  </button>
  <button class="nb" id="nb-1" onclick="openReg(1)">
    <span class="ni">📋</span><span class="ndot" style="background:var(--a2)"></span>
    <span class="nbadge" id="b1"></span>Dead Stock
  </button>
  <button class="nb" id="nb-2" onclick="openReg(2)">
    <span class="ni">🗂️</span><span class="ndot" style="background:var(--a3)"></span>
    <span class="nbadge" id="b2"></span>Consumable
  </button>
  <button class="nb" id="nb-3" onclick="openReg(3)">
    <span class="ni">💼</span><span class="ndot" style="background:var(--a4)"></span>
    <span class="nbadge" id="b3"></span>Salary
  </button>
</nav>

<!-- MODAL -->
<div class="ovlay" id="ovlay">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mhead">
      <div><h3 id="mtitle">Add Entry</h3><p id="msub"></p></div>
      <button class="mcls" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody" id="mbody"></div>
    <div class="mfoot">
      <button class="bcnl" onclick="closeModal()">Cancel</button>
      <button class="bsave" id="bsave" onclick="saveEntry()">💾 Save Entry</button>
    </div>
  </div>
</div>

<!-- DELETE -->
<div class="dovlay" id="dovlay">
  <div class="dbox">
    <h4>Delete Entry?</h4>
    <p>This entry will be permanently removed.</p>
    <div class="dbtns">
      <button class="dno" onclick="closeDel()">Cancel</button>
      <button class="dyes" onclick="confirmDel()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const SK=['imprest','deadstock','consumable','salary'];
const ld=k=>{try{return JSON.parse(localStorage.getItem(k)||'[]');}catch{return[];}};
const sv=(k,d)=>localStorage.setItem(k,JSON.stringify(d));
const DB=[ld('imprest'),ld('deadstock'),ld('consumable'),ld('salary')];

// ── CONFIGS ──
const R=[
  {
    name:'Imprest Bill',emoji:'🧾',color:'var(--a1)',bg:'rgba(108,143,255,0.15)',
    desc:'Capital goods purchase with GST',
    fields:[
      {k:'date',lb:'Date',t:'date',ph:'',isDate:true},
      {k:'itemName',lb:'Item Name',t:'text',ph:'e.g. Office Chair'},
      {k:'memoNo',lb:'Cash Memo No.',t:'text',ph:'e.g. CM/001'},
      {k:'price',lb:'Item Price (₹)',t:'number',ph:'0.00'},
      {k:'sgst',lb:'SGST %',t:'number',ph:'9'},
      {k:'cgst',lb:'CGST %',t:'number',ph:'9'},
    ],
    calc:r=>{const p=+r.price||0,s=p*(+r.sgst||0)/100,c=p*(+r.cgst||0)/100;return{sa:s,ca:c,tot:p+s+c};},
    card:(r,t)=>`
      <div class="ecard-date">${fd(r.date)}</div>
      <div class="ectop"><div class="ename">${r.itemName||'—'}</div><div class="etotal" style="color:var(--a1)">${F(t.tot)}</div></div>
      <div class="emeta">
        <div class="mc">Memo: <span>${r.memoNo||'—'}</span></div>
        <div class="mc">Price: <span>${F(r.price)}</span></div>
        <div class="mc">SGST ${r.sgst||0}%: <span>${F(t.sa)}</span></div>
        <div class="mc">CGST ${r.cgst||0}%: <span>${F(t.ca)}</span></div>
      </div>`,
    prev:v=>{const p=+v.price||0,s=p*(+v.sgst||0)/100,c=p*(+v.cgst||0)/100;return[['Price',F(p),''],['SGST '+(v.sgst||0)+'%','+ '+F(s),''],['CGST '+(v.cgst||0)+'%','+ '+F(c),''],['Total',F(p+s+c),'var(--a1)',1]];},
    tot:rows=>rows.reduce((s,r)=>{const p=+r.price||0,sg=p*(+r.sgst||0)/100,cg=p*(+r.cgst||0)/100;return s+p+sg+cg;},0),
    sl:['Entries','Total Price','Total Tax','Grand Total'],
    st:rows=>{const t=rows.reduce((s,r)=>{const p=+r.price||0,sg=p*(+r.sgst||0)/100,cg=p*(+r.cgst||0)/100;return{p:s.p+p,x:s.x+sg+cg,g:s.g+p+sg+cg};},{p:0,x:0,g:0});return[rows.length,F(t.p),F(t.x),F(t.g)];},
    csvHeaders:['Date','Item Name','Cash Memo No','Item Price','SGST %','SGST Amt','CGST %','CGST Amt','Total'],
    csvRow:r=>{const t=R[0].calc(r);return[fd(r.date),r.itemName,r.memoNo,r.price,r.sgst,t.sa.toFixed(2),r.cgst,t.ca.toFixed(2),t.tot.toFixed(2)];}
  },
  {
    name:'Dead Stock Register',emoji:'📋',color:'var(--a2)',bg:'rgba(224,92,92,0.15)',
    desc:'Capital goods bill tracking',
    fields:[
      {k:'date',lb:'Date',t:'date',ph:'',isDate:true},
      {k:'itemName',lb:'Item Name',t:'text',ph:'e.g. Printer'},
      {k:'receiptNo',lb:'Receipt No.',t:'text',ph:'e.g. RCP/001'},
      {k:'price',lb:'Item Price (₹)',t:'number',ph:'0.00'},
      {k:'sgst',lb:'SGST %',t:'number',ph:'9'},
      {k:'cgst',lb:'CGST %',t:'number',ph:'9'},
    ],
    calc:r=>{const p=+r.price||0,s=p*(+r.sgst||0)/100,c=p*(+r.cgst||0)/100;return{sa:s,ca:c,tot:p+s+c};},
    card:(r,t)=>`
      <div class="ecard-date">${fd(r.date)}</div>
      <div class="ectop"><div class="ename">${r.itemName||'—'}</div><div class="etotal" style="color:var(--a2)">${F(t.tot)}</div></div>
      <div class="emeta">
        <div class="mc">Receipt: <span>${r.receiptNo||'—'}</span></div>
        <div class="mc">Price: <span>${F(r.price)}</span></div>
        <div class="mc">SGST ${r.sgst||0}%: <span>${F(t.sa)}</span></div>
        <div class="mc">CGST ${r.cgst||0}%: <span>${F(t.ca)}</span></div>
      </div>`,
    prev:v=>{const p=+v.price||0,s=p*(+v.sgst||0)/100,c=p*(+v.cgst||0)/100;return[['Price',F(p),''],['SGST '+(v.sgst||0)+'%','+ '+F(s),''],['CGST '+(v.cgst||0)+'%','+ '+F(c),''],['Total',F(p+s+c),'var(--a2)',1]];},
    tot:rows=>rows.reduce((s,r)=>{const p=+r.price||0,sg=p*(+r.sgst||0)/100,cg=p*(+r.cgst||0)/100;return s+p+sg+cg;},0),
    sl:['Entries','Total Price','Total Tax','Grand Total'],
    st:rows=>{const t=rows.reduce((s,r)=>{const p=+r.price||0,sg=p*(+r.sgst||0)/100,cg=p*(+r.cgst||0)/100;return{p:s.p+p,x:s.x+sg+cg,g:s.g+p+sg+cg};},{p:0,x:0,g:0});return[rows.length,F(t.p),F(t.x),F(t.g)];},
    csvHeaders:['Date','Item Name','Receipt No','Item Price','SGST %','SGST Amt','CGST %','CGST Amt','Total'],
    csvRow:r=>{const t=R[1].calc(r);return[fd(r.date),r.itemName,r.receiptNo,r.price,r.sgst,t.sa.toFixed(2),r.cgst,t.ca.toFixed(2),t.tot.toFixed(2)];}
  },
  {
    name:'Consumable Register',emoji:'🗂️',color:'var(--a3)',bg:'rgba(62,207,142,0.15)',
    desc:'Day-to-day supplies tracking',
    fields:[
      {k:'date',lb:'Date',t:'date',ph:'',isDate:true},
      {k:'particular',lb:'Particular',t:'text',ph:'e.g. A4 Paper'},
      {k:'qty',lb:'Quantity',t:'number',ph:'1'},
      {k:'rate',lb:'Rate (₹)',t:'number',ph:'0.00'},
      {k:'sgst',lb:'SGST %',t:'number',ph:'9'},
      {k:'cgst',lb:'CGST %',t:'number',ph:'9'},
    ],
    calc:r=>{const b=(+r.qty||0)*(+r.rate||0),s=b*(+r.sgst||0)/100,c=b*(+r.cgst||0)/100;return{b,sa:s,ca:c,tot:b+s+c};},
    card:(r,t)=>`
      <div class="ecard-date">${fd(r.date)}</div>
      <div class="ectop"><div class="ename">${r.particular||'—'}</div><div class="etotal" style="color:var(--a3)">${F(t.tot)}</div></div>
      <div class="emeta">
        <div class="mc">Qty: <span>${r.qty||0}</span></div>
        <div class="mc">Rate: <span>${F(r.rate)}</span></div>
        <div class="mc">SGST ${r.sgst||0}%: <span>${F(t.sa)}</span></div>
        <div class="mc">CGST ${r.cgst||0}%: <span>${F(t.ca)}</span></div>
      </div>`,
    prev:v=>{const b=(+v.qty||0)*(+v.rate||0),s=b*(+v.sgst||0)/100,c=b*(+v.cgst||0)/100;return[['Qty×Rate',F(b),''],['SGST '+(v.sgst||0)+'%','+ '+F(s),''],['CGST '+(v.cgst||0)+'%','+ '+F(c),''],['Grand Total',F(b+s+c),'var(--a3)',1]];},
    tot:rows=>rows.reduce((s,r)=>{const b=(+r.qty||0)*(+r.rate||0),sg=b*(+r.sgst||0)/100,cg=b*(+r.cgst||0)/100;return s+b+sg+cg;},0),
    sl:['Entries','Base Amount','Total Tax','Grand Total'],
    st:rows=>{const t=rows.reduce((s,r)=>{const b=(+r.qty||0)*(+r.rate||0),sg=b*(+r.sgst||0)/100,cg=b*(+r.cgst||0)/100;return{b:s.b+b,x:s.x+sg+cg,g:s.g+b+sg+cg};},{b:0,x:0,g:0});return[rows.length,F(t.b),F(t.x),F(t.g)];},
    csvHeaders:['Date','Particular','Qty','Rate','SGST %','SGST Amt','CGST %','CGST Amt','Grand Total'],
    csvRow:r=>{const t=R[2].calc(r);return[fd(r.date),r.particular,r.qty,r.rate,r.sgst,t.sa.toFixed(2),r.cgst,t.ca.toFixed(2),t.tot.toFixed(2)];}
  },
  {
    name:'Salary Register',emoji:'💼',color:'var(--a4)',bg:'rgba(240,169,76,0.15)',
    desc:'Monthly salary & deductions',
    fields:[
      {k:'date',lb:'Date',t:'date',ph:'',isDate:true},
      {k:'gross',lb:'Gross Salary (₹)',t:'number',ph:'0.00'},
      {k:'tds',lb:'TDS Deduction (₹)',t:'number',ph:'0.00'},
      {k:'stateTax',lb:'State Tax (₹)',t:'number',ph:'259',ro:true,dv:259},
      {k:'inHand',lb:'In Hand (₹)',t:'number',ph:'0.00'},
    ],
    calc:r=>{return{net:(+r.gross||0)-(+r.tds||0)-259};},
    card:(r,t)=>`
      <div class="ecard-date">${fd(r.date)}</div>
      <div class="ectop"><div class="ename">Salary — ${fd(r.date)}</div><div class="etotal" style="color:var(--a4)">${F(t.net)}</div></div>
      <div class="emeta">
        <div class="mc">Gross: <span>${F(r.gross)}</span></div>
        <div class="mc">TDS: <span style="color:var(--a2)">${F(r.tds)}</span></div>
        <div class="mc">State Tax: <span style="color:var(--gold)">₹259</span></div>
        <div class="mc">In Hand: <span>${F(r.inHand)}</span></div>
      </div>`,
    prev:v=>{const g=+v.gross||0,tds=+v.tds||0,net=g-tds-259;return[['Gross Salary',F(g),''],['TDS','− '+F(tds),'var(--a2)'],['State Tax','− ₹259','var(--gold)'],['Net Payable',F(net),'var(--a4)',1]];},
    tot:rows=>rows.reduce((s,r)=>s+(+r.gross||0)-(+r.tds||0)-259,0),
    sl:['Months','Total Gross','Deductions','Net Payable'],
    st:rows=>{const t=rows.reduce((s,r)=>({g:s.g+(+r.gross||0),d:s.d+(+r.tds||0)+259,n:s.n+(+r.gross||0)-(+r.tds||0)-259}),{g:0,d:0,n:0});return[rows.length,F(t.g),F(t.d),F(t.n)];},
    csvHeaders:['Date','Gross Salary','TDS Deduction','State Tax','In Hand','Net Payable'],
    csvRow:r=>{const t=R[3].calc(r);return[fd(r.date),r.gross,r.tds,259,r.inHand,t.net.toFixed(2)];}
  }
];

// ── HELPERS ──
const F=v=>'₹'+(+v||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const fd=d=>{if(!d)return'—';try{const[y,m,dy]=d.split('-');return`${dy}-${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]}-${y}`;}catch{return d;}};
const fmtMonth=d=>{if(!d)return'';try{const[y,m]=d.split('-');return`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]} ${y}`;}catch{return d;}};

function updBadges(){
  DB.forEach((d,i)=>{const b=document.getElementById('b'+i);if(d.length){b.textContent=d.length;b.style.display='block';}else b.style.display='none';});
  document.getElementById('gtotal').textContent=F(DB.reduce((s,d,i)=>s+R[i].tot(d),0));
}

// ── NAV ──
let curReg=-1,srch='',fFrom='',fTo='';
function setNav(id){document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showPg(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+n).classList.add('active');}
function showDash(){setNav('nb-d');showPg('dash');renderDash();}
function goBack(){curReg=-1;srch='';fFrom='';fTo='';showDash();}
function openReg(i){
  curReg=i;srch='';fFrom='';fTo='';
  document.getElementById('sinput').value='';
  document.getElementById('fdate-from').value='';
  document.getElementById('fdate-to').value='';
  document.getElementById('clr-btn').style.display='none';
  setNav('nb-'+i);showPg('reg');renderReg(i);
}
function onSearch(v){srch=v;renderReg(curReg);}
function applyFilter(){
  fFrom=document.getElementById('fdate-from').value;
  fTo=document.getElementById('fdate-to').value;
  document.getElementById('clr-btn').style.display=(fFrom||fTo)?'block':'none';
  renderReg(curReg);
}
function clearFilter(){
  fFrom='';fTo='';
  document.getElementById('fdate-from').value='';
  document.getElementById('fdate-to').value='';
  document.getElementById('clr-btn').style.display='none';
  renderReg(curReg);
}

// ── DASHBOARD ──
function renderDash(){
  document.getElementById('d-ent').textContent=DB.reduce((s,d)=>s+d.length,0);
  document.getElementById('d-gt').textContent=F(DB.reduce((s,d,i)=>s+R[i].tot(d),0));
  document.getElementById('rcards').innerHTML=R.map((r,i)=>`
    <div class="rcard" onclick="openReg(${i})">
      <div class="rcard-bar" style="background:${r.color}"></div>
      <div class="rcard-icon" style="background:${r.bg}">${r.emoji}</div>
      <div class="rcard-info"><div class="rcard-name">${r.name}</div><div class="rcard-desc">${r.desc}</div></div>
      <div class="rcard-right"><div class="rcard-count" style="color:${r.color}">${DB[i].length}</div><div class="rcard-lbl">entries</div></div>
      <div class="rcard-arr">›</div>
    </div>`).join('');
}

// ── REGISTER ──
function renderReg(i){
  const reg=R[i],rows=DB[i],stats=reg.st(rows);
  document.getElementById('rtitle').textContent=reg.name;
  document.getElementById('rsub').textContent=rows.length+' entries · '+((fFrom||fTo)?'Filtered':'All dates');
  document.getElementById('radd').style.background=reg.color;
  document.getElementById('rstats').innerHTML=stats.map((v,j)=>`
    <div class="rsc"><div class="rsl">${reg.sl[j]}</div>
    <div class="rsv" style="${j===3?'color:'+reg.color:''}">${v}</div></div>`).join('');

  // filter
  let filtered=rows.filter(r=>{
    const sv=Object.values(r).some(v=>String(v).toLowerCase().includes(srch.toLowerCase()));
    if(!sv)return false;
    if(fFrom&&r.date&&r.date<fFrom)return false;
    if(fTo&&r.date&&r.date>fTo)return false;
    return true;
  });

  // sort by date desc
  filtered=[...filtered].sort((a,b)=>{
    if(!a.date&&!b.date)return 0;
    if(!a.date)return 1; if(!b.date)return -1;
    return b.date.localeCompare(a.date);
  });

  const cont=document.getElementById('rcontent');
  if(!filtered.length){
    cont.innerHTML=`<div class="empty"><div class="ei">${reg.emoji}</div>
      <p>${(srch||fFrom||fTo)?'No entries match your filter.':'No entries yet.<br/>Tap <b>＋ Add</b> to add your first entry!'}</p></div>`;
    return;
  }

  // group by month
  const groups={};
  filtered.forEach(r=>{
    const key=r.date?r.date.substring(0,7):'unknown';
    if(!groups[key])groups[key]=[];
    groups[key].push(r);
  });

  const filteredTotal=reg.tot(filtered);

  let html=`<div class="hint">💡 Long press entry to delete · Sorted latest first</div>`;
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(month=>{
    const label=month==='unknown'?'No Date':fmtMonth(month+'-01');
    const mTotal=reg.tot(groups[month]);
    html+=`<div class="dgroup-hdr">📅 ${label} &nbsp;·&nbsp; ${groups[month].length} entries &nbsp;·&nbsp; <span style="color:${reg.color};font-family:'JetBrains Mono',monospace">${F(mTotal)}</span></div>`;
    html+=`<div class="elist">`;
    groups[month].forEach(r=>{
      const ri=rows.indexOf(r),t=reg.calc(r);
      html+=`<div class="ecard" id="ec${ri}" ontouchstart="lps(${i},${ri})" ontouchend="lpe()" ontouchmove="lpe()">
        ${reg.card(r,t)}
        <button class="edel-btn" onclick="askDel(${i},${ri})">🗑 Delete</button>
      </div>`;
    });
    html+=`</div>`;
  });

  html+=`<div class="gbar"><div class="glabel">${(fFrom||fTo)?'Filtered Total':'Grand Total'}</div>
    <div class="gval" style="color:${reg.color}">${F(filteredTotal)}</div></div>`;
  cont.innerHTML=html;
}

// ── LONG PRESS ──
let lpT=null;
function lps(ri,ei){lpT=setTimeout(()=>{const c=document.getElementById('ec'+ei);if(c)c.classList.add('sel');},550);}
function lpe(){clearTimeout(lpT);}

// ── DELETE ──
let dRI=-1,dEI=-1;
function askDel(ri,ei){dRI=ri;dEI=ei;document.getElementById('dovlay').classList.add('open');}
function closeDel(){document.getElementById('dovlay').classList.remove('open');}
function confirmDel(){DB[dRI].splice(dEI,1);sv(SK[dRI],DB[dRI]);updBadges();closeDel();renderReg(dRI);toast('🗑️ Deleted');}

// ── MODAL ──
let aRI=-1;
function openModal(){
  aRI=curReg;const reg=R[aRI];
  document.getElementById('mtitle').textContent='Add — '+reg.name;
  document.getElementById('msub').textContent=reg.desc;
  document.getElementById('bsave').style.background=reg.color;
  buildFields(aRI);
  document.getElementById('ovlay').classList.add('open');
}
function closeModal(){document.getElementById('ovlay').classList.remove('open');}
document.getElementById('ovlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

function buildFields(i){
  const reg=R[i],flds=reg.fields;let html='';
  // Date always full width first
  const dateFld=flds.find(f=>f.isDate);
  if(dateFld) html+=fh(dateFld);
  // Rest in pairs
  const rest=flds.filter(f=>!f.isDate);
  for(let j=0;j<rest.length;j+=2){
    const f1=rest[j],f2=rest[j+1];
    html+=f2?`<div class="frow">${fh(f1)}${fh(f2)}</div>`:fh(f1);
  }
  html+=`<div class="cprev" id="cprev">${buildPrev(i,{})}</div>`;
  document.getElementById('mbody').innerHTML=html;
  flds.forEach(f=>{
    const el=document.getElementById('mf-'+f.k);if(!el)return;
    if(f.dv!==undefined)el.value=f.dv;
    if(f.isDate)el.value=new Date().toISOString().split('T')[0];
    if(!f.ro)el.addEventListener('input',()=>refreshPrev(i));
  });
  refreshPrev(i);
}
function fh(f){
  return`<div class="fg"><label>${f.lb}</label>
    <input id="mf-${f.k}" type="${f.t}" placeholder="${f.ph||''}"
      ${f.ro?'readonly':''} ${f.t==='number'?'inputmode="decimal" step="any" min="0"':''}/>
  </div>`;
}
function getV(i){const v={};R[i].fields.forEach(f=>{const e=document.getElementById('mf-'+f.k);v[f.k]=e?e.value:'';});return v;}
function refreshPrev(i){document.getElementById('cprev').innerHTML=buildPrev(i,getV(i));}
function buildPrev(i,v){return R[i].prev(v).map(([l,val,c,tot])=>`<div class="crow${tot?' tot':''}"><span>${l}</span><span style="${c?'color:'+c:''}">${val}</span></div>`).join('');}

// ── SAVE ──
function saveEntry(){
  const i=aRI,reg=R[i],v=getV(i);
  const miss=reg.fields.filter(f=>!f.ro&&!f.isDate&&(!v[f.k]||v[f.k]===''));
  if(miss.length){toast('⚠️ Fill: '+miss.map(f=>f.lb).join(', '));return;}
  if(i===3)v.stateTax=259;
  DB[i].push(v);sv(SK[i],DB[i]);
  updBadges();closeModal();renderReg(i);toast('✅ Saved on '+fd(v.date));
}

// ── EXPORT CSV ──
function exportCSV(){
  const i=curReg,reg=R[i],rows=DB[i];
  if(!rows.length){toast('⚠️ No data to export');return;}
  let csv=[reg.csvHeaders.join(',')];
  // apply current filter
  const filtered=rows.filter(r=>{
    if(fFrom&&r.date&&r.date<fFrom)return false;
    if(fTo&&r.date&&r.date>fTo)return false;
    return true;
  }).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  filtered.forEach(r=>csv.push(reg.csvRow(r).map(v=>`"${v}"`).join(',')));
  const blob=new Blob([csv.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=reg.name.replace(/ /g,'_')+'_'+(fFrom||'all')+'.csv';
  a.click();URL.revokeObjectURL(url);
  toast('📥 CSV exported!');
}

// ── EXPORT ALL ──
function exportAll(){
  let all='OFFICE REGISTER — COMPLETE DATA EXPORT\n';
  all+='Generated: '+new Date().toLocaleString('en-IN')+'\n\n';
  R.forEach((reg,i)=>{
    const rows=DB[i];
    all+=`${'='.repeat(50)}\n${reg.emoji} ${reg.name.toUpperCase()}\n${'='.repeat(50)}\n`;
    if(!rows.length){all+='No entries\n\n';return;}
    all+=reg.csvHeaders.join(' | ')+'\n';
    all+='-'.repeat(80)+'\n';
    [...rows].sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(r=>{
      all+=reg.csvRow(r).join(' | ')+'\n';
    });
    all+=`\nGrand Total: ${F(reg.tot(rows))}\n\n`;
  });
  const blob=new Blob([all],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='All_Registers_'+new Date().toISOString().split('T')[0]+'.txt';
  a.click();URL.revokeObjectURL(url);
  toast('📊 All data exported!');
}

// ── TOAST ──
let tT;
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>e.classList.remove('show'),2500);}

// ── INIT ──
updBadges();renderDash();
</script>
